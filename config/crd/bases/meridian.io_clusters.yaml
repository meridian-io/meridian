apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusters.meridian.io
spec:
  group: meridian.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                workers:
                  type: integer
                  format: int64
                coordinatorURL:
                  type: string
                clientId:
                  type: string
                  nullable: true
                reservationId:
                  type: string
                  nullable: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Idle, Reserved, Failed]
                ready:
                  type: boolean
                coordinatorURL:
                  type: string
                idleAt:
                  type: string
                reservedAt:
                  type: string
                message:
                  type: string
  scope: Namespaced
  names:
    plural: clusters
    singular: cluster
    kind: Cluster
    shortNames:
      - mc
