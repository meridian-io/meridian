apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterpoolautoscalers.meridian.io
spec:
  group: meridian.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [targetRef, minReplicas, maxReplicas]
              properties:
                targetRef:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                minReplicas:
                  type: integer
                  format: int64
                  minimum: 0
                maxReplicas:
                  type: integer
                  format: int64
                utilizationThreshold:
                  type: string
            status:
              type: object
              properties:
                currentReplicas:
                  type: integer
                  format: int64
                lastScaleTime:
                  type: string
  scope: Namespaced
  names:
    plural: clusterpoolautoscalers
    singular: clusterpoolautoscaler
    kind: ClusterPoolAutoscaler
    shortNames:
      - mcpa
