version: 2

project_name: meridian-mcp

before:
  hooks:
    - bash -c "cd mcp && go mod tidy"

builds:
  - id: meridian-mcp
    main: ./cmd/meridian-mcp
    dir: mcp
    binary: meridian-mcp
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: meridian-mcp
    builds: [meridian-mcp]
    name_template: "meridian-mcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

dockers:
  - image_templates:
      - "ghcr.io/meridian-io/meridian-mcp:{{ .Tag }}-amd64"
    dockerfile: mcp/Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/meridian-io/meridian"
  - image_templates:
      - "ghcr.io/meridian-io/meridian-mcp:{{ .Tag }}-arm64"
    dockerfile: mcp/Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/meridian-io/meridian-mcp:{{ .Tag }}"
    image_templates:
      - "ghcr.io/meridian-io/meridian-mcp:{{ .Tag }}-amd64"
      - "ghcr.io/meridian-io/meridian-mcp:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/meridian-io/meridian-mcp:latest"
    image_templates:
      - "ghcr.io/meridian-io/meridian-mcp:{{ .Tag }}-amd64"
      - "ghcr.io/meridian-io/meridian-mcp:{{ .Tag }}-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
