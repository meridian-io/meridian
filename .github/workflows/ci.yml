name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp:
    name: MCP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: mcp/go.sum

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Vet
        run: go vet ./...

  operator:
    name: Operator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: operator/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -coverprofile=../coverage-operator.out
