services:
  trino:
    image: trinodb/trino:435
    container_name: meridian-trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  mysql:
    image: mysql:8.0
    container_name: meridian-mysql
    environment:
      MYSQL_ROOT_PASSWORD: trino_test
      MYSQL_DATABASE: testdb
      MYSQL_USER: trino
      MYSQL_PASSWORD: trino_test
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptrino_test"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  adminer:
    image: adminer:latest
    container_name: meridian-adminer
    ports:
      - "8081:8080"
    depends_on:
      - mysql

  # Vault in dev mode — for testing the vault credential provider.
  # Root token: "root"  KV mount: "secret"
  # Seed secrets after start: hack/seed-vault.sh
  vault:
    image: hashicorp/vault:1.17
    container_name: meridian-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status | grep -q 'Initialized.*true'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
