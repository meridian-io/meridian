---
# Kubernetes Secret containing MySQL catalog credentials for credential rotation testing.
# Apply: kubectl apply -f config/samples/test-k8s-secret.yaml -n meridian
#
# The operator's KubernetesProvider reads this Secret when the cluster is annotated with:
#   meridian.io/rotate-credentials: "kubernetes/mysql_prod/mysql-catalog-creds"
apiVersion: v1
kind: Secret
metadata:
  name: mysql-catalog-creds
  namespace: meridian
type: Opaque
stringData:
  connector.name: mysql
  connection-url: "jdbc:mysql://host.docker.internal:3306/testdb"
  connection-user: root
  connection-password: trino_test
